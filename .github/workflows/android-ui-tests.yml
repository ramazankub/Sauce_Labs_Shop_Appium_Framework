name: Android UI Tests (Appium)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Compile & validate the project builds
  # ──────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build project (compile only, skip tests)
        run: ./gradlew clean build -x test

  # ──────────────────────────────────────────────
  # JOB 2: Run UI tests on Android Emulator
  # ──────────────────────────────────────────────
  android-tests:
    name: Android UI Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium -v

      - name: Download Sauce Labs APK
        run: |
          curl -L \
            "https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk" \
            -o sauce-labs.apk

      - name: Inject APK path into android.properties
        run: |
          printf '\napp=%s/sauce-labs.apk\n' "$(pwd)" >> src/test/resources/capabilities/android.properties

      - name: Start Appium server in background
        run: appium --log appium.log &

      - name: Wait for Appium
        run: |
          until curl -s http://127.0.0.1:4723/status; do
            sleep 2
          done  

      - name: Run Android UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: CI_AVD
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew test -Dplatform=android
        env:
          TEST_FIRST_USER:           ${{ secrets.TEST_FIRST_USER }}
          TEST_CORRECT_PASSWORD:     ${{ secrets.TEST_CORRECT_PASSWORD }}
          TEST_INCORRECT_LOGIN:      ${{ secrets.TEST_INCORRECT_LOGIN }}
          TEST_INCORRECT_PASSWORD:   ${{ secrets.TEST_INCORRECT_PASSWORD }}

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-android
          path: build/test-results
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android
          path: build/allure-results
          retention-days: 7

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          retention-days: 3

      - name: Generate Allure report
        if: always()
        run: ./gradlew allureReport

      - name: Parse Allure summary
        if: always()
        id: allure
        run: |
          SUMMARY="build/reports/allure-report/allureReport/widgets/summary.json"

          if [ -f "$SUMMARY" ]; then
            PASSED=$(python3  -c "import json; d=json.load(open('$SUMMARY')); print(d['statistic']['passed'])")
            FAILED=$(python3  -c "import json; d=json.load(open('$SUMMARY')); print(d['statistic']['failed'])")
            BROKEN=$(python3  -c "import json; d=json.load(open('$SUMMARY')); print(d['statistic']['broken'])")
            SKIPPED=$(python3 -c "import json; d=json.load(open('$SUMMARY')); print(d['statistic']['skipped'])")
            TOTAL=$(python3   -c "import json; d=json.load(open('$SUMMARY')); print(d['statistic']['total'])")
            DURATION_MS=$(python3 -c "import json; d=json.load(open('$SUMMARY')); print(d['time'].get('duration', 0))")
            DURATION_S=$(( DURATION_MS / 1000 ))
            DURATION_MIN=$(( DURATION_S / 60 ))
            DURATION_SEC=$(( DURATION_S % 60 ))
            DURATION_STR="${DURATION_MIN}m ${DURATION_SEC}s"
          else
            PASSED=0; FAILED=0; BROKEN=0; SKIPPED=0; TOTAL=0; DURATION_STR="n/a"
          fi

          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "broken=$BROKEN"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "duration=$DURATION_STR" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          elif [ "$STATUS" = "cancelled" ]; then
            ICON="⚪️"
          else
            ICON="❌"
          fi

          MESSAGE="${ICON} <b>Android UI Tests</b>"
          MESSAGE+=$'\n\n'
          MESSAGE+="📦 <b>Repo:</b> ${{ github.repository }}"$'\n'
          MESSAGE+="🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>"$'\n'
          MESSAGE+="👤 <b>Author:</b> ${{ github.actor }}"$'\n'
          MESSAGE+="📝 <b>Commit:</b> <code>${GITHUB_SHA::7}</code>"$'\n'
          MESSAGE+="🔘 <b>Status:</b> ${STATUS}"
          MESSAGE+=$'\n\n'
          MESSAGE+="📊 <b>Test Results:</b>"$'\n'
          MESSAGE+="✅ Passed:  ${{ steps.allure.outputs.passed }}"$'\n'
          MESSAGE+="❌ Failed:  ${{ steps.allure.outputs.failed }}"$'\n'
          MESSAGE+="💥 Broken:  ${{ steps.allure.outputs.broken }}"$'\n'
          MESSAGE+="⏭️ Skipped: ${{ steps.allure.outputs.skipped }}"$'\n'
          MESSAGE+="📋 Total:   ${{ steps.allure.outputs.total }}"$'\n'
          MESSAGE+="⏱️ Duration: ${{ steps.allure.outputs.duration }}"
          MESSAGE+=$'\n\n'
          MESSAGE+="🔗 <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Run</a>"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"
