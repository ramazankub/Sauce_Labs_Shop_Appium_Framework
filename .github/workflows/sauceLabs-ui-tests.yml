name: Android UI Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium & uiautomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download APK
        run: |
          curl -L \
            https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk \
            -o sauce-labs.apk

      - name: Inject app path into capabilities
        run: |
          printf '\napp=%s/sauce-labs.apk\n' "$(pwd)" >> src/test/resources/capabilities/android.properties

      - name: Run tests inside emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            appium --log appium.log --log-timestamp &

            echo "Waiting for Appium..."
            for i in $(seq 1 30); do
              curl -s http://127.0.0.1:4723/status | grep -q '"ready":true' && echo "Appium ready" && break
              sleep 1
            done

            ./gradlew test

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            build/reports/tests
            build/test-results
            build/allure-results
            appium.log

      - name: Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MESSAGE="${ICON} Android UI Tests\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nStatus: ${STATUS}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"
