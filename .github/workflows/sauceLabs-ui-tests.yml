name: Android UI Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - run: chmod +x gradlew

      - name: Install Appium & uiautomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download APK
        run: |
          curl -L \
            https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk \
            -o sauce-labs.apk

      - name: Inject app path into capabilities
        run: |
          printf '\napp=%s/sauce-labs.apk\n' "$(pwd)" >> src/test/resources/capabilities/android.properties

      - name: Run tests inside emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Wait for emulator to be fully booted
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            echo "Emulator booted"

            # Start Appium in background
            appium --log appium.log --log-timestamp &
            APPIUM_PID=$!
            echo "Appium PID: $APPIUM_PID"

            # Wait until Appium is ready
            echo "Waiting for Appium to start..."
            for i in $(seq 1 30); do
              if curl -s http://127.0.0.1:4723/status | grep -q '"ready"'; then
                echo "Appium is ready after ${i}s"
                break
              fi
              sleep 1
            done

            # Run tests
            ./gradlew test
            TEST_EXIT=$?

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            build/reports/tests
            build/test-results
            build/allure-results
            appium.log

      - name: Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          MESSAGE="${ICON} Android UI Tests
Repo: ${{ github.repository }}
Branch: ${{ github.ref_name }}
Status: ${STATUS}
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"
