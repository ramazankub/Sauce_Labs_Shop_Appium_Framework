name: Android UI Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle


      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Build sanity check
        run: ./gradlew testClasses


      - name: Install Appium & uiautomator2
        run: |
          npm install -g appium@2.19.0
          appium driver install uiautomator2 || true
          appium driver list


      - name: Download APK
        run: |
          curl -L \
            https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk \
            -o sauce-labs.apk


      - name: Inject app path into capabilities
        run: |
          printf '\napp=%s/sauce-labs.apk\n' "$(pwd)" >> src/test/resources/capabilities/android.properties


      - name: Make test script executable
        run: chmod +x run-tests.sh


      - name: Run tests in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb devices
            bash run-tests.sh


      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            build/reports/tests
            build/test-results
            build/allure-results
            appium.log


      - name: Telegram notification
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          MESSAGE="${ICON} Android UI Tests | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Status: ${STATUS} | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"